<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hatching Track</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07080c;--panel:#0c0e16;--panel2:#111420;--panel3:#171b28;
  --border:rgba(255,255,255,0.055);--border2:rgba(255,255,255,0.1);
  --acc:#a855f7;--acc2:#7c3aed;--acc-d:rgba(168,85,247,0.13);--acc-b:rgba(168,85,247,0.3);
  --teal:#22d3ee;--teal-d:rgba(34,211,238,0.11);--teal-b:rgba(34,211,238,0.28);
  --grn:#4ade80;--grn-d:rgba(74,222,128,0.11);--grn-b:rgba(74,222,128,0.28);
  --amb:#fbbf24;--amb-d:rgba(251,191,36,0.11);
  --red:#f87171;--red-d:rgba(248,113,113,0.11);
  --off:#3a4556;
  --text:#dde4f0;--text2:#8896a8;--text3:#3e4d60;
  --sans:'Inter',sans-serif;--mono:'Share Tech Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;display:flex;flex-direction:column;height:100vh}

/* ─ Header ─ */
header{
  display:flex;align-items:center;gap:12px;padding:0 16px;height:48px;
  background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0;z-index:20;
  position:relative;
}
header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--acc-b),transparent);animation:shimmer 3s linear infinite;background-size:200% 100%}
.logo{display:flex;align-items:center;gap:10px}
.logo-ic{
  width:30px;height:30px;border-radius:7px;background:var(--acc-d);
  border:1px solid var(--acc-b);display:flex;align-items:center;justify-content:center;
  font-size:14px;color:var(--acc);font-weight:700;font-family:var(--mono);
  overflow:hidden;position:relative;
}
.logo-ic img{
  width:100%;height:100%;object-fit:cover;border-radius:6px;
  position:absolute;inset:0;
  transition:opacity 1.2s cubic-bezier(.4,0,.2,1),transform 1.2s cubic-bezier(.4,0,.2,1);
}
.logo-ic img.av-out{opacity:0;transform:scale(1.1) rotate(3deg)}
.logo-ic img.av-in{opacity:1;transform:scale(1) rotate(0deg)}
.logo-n{font-size:13px;font-weight:700;color:#fff}
.logo-s{font-size:10px;color:var(--text3);font-family:var(--mono);margin-top:1px}
.h-mid{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;max-width:380px;margin:0 auto}
.api-wrap{
  display:flex;align-items:center;gap:6px;background:var(--panel2);
  border:1px solid var(--border);border-radius:7px;padding:0 10px;height:30px;flex:1;
}
.api-wrap input{
  background:none;border:none;outline:none;color:var(--text2);
  font-family:var(--mono);font-size:11px;flex:1;min-width:0;
}
.api-wrap input::placeholder{color:var(--text3)}
.api-lbl{font-size:10px;color:var(--text3);white-space:nowrap}
.h-right{display:flex;align-items:center;gap:8px}
.live-pill{
  display:flex;align-items:center;gap:6px;background:var(--panel2);
  border:1px solid var(--border);border-radius:20px;padding:3px 10px;
  font-size:10px;color:var(--text3);font-family:var(--mono);
}
.ld{width:6px;height:6px;border-radius:50%;background:var(--text3);flex-shrink:0}
.ld.on{background:var(--acc);box-shadow:0 0 7px rgba(168,85,247,.5);animation:pu 2s infinite}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.4}}
.hbtn{height:28px;padding:0 10px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-size:11px;font-family:var(--sans);transition:all .12s}
.hbtn:hover{background:var(--panel2);color:var(--text)}

/* ─ Layout ─ */
.layout{display:grid;grid-template-columns:252px 1fr;flex:1;overflow:hidden}

/* ─ Sidebar ─ */
.sb{background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sb-hd{padding:10px 12px 8px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.sb-ttl{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.14em;text-transform:uppercase}
.sb-cnt{font-size:10px;font-family:var(--mono);color:var(--text3);background:var(--panel2);border-radius:10px;padding:2px 7px}
.sb-list{flex:1;overflow-y:auto;padding:6px}
.sb-list::-webkit-scrollbar{width:3px}
.sb-list::-webkit-scrollbar-thumb{background:var(--panel3);border-radius:2px}
.sb-nil{padding:24px 8px;text-align:center;color:var(--text3);font-size:11px;line-height:1.9}

/* Profile item — three visual states */
.pi{
  display:flex;align-items:center;gap:9px;padding:8px 9px;border-radius:8px;
  cursor:pointer;border:1px solid transparent;margin-bottom:4px;
  transition:all .12s;position:relative;overflow:hidden;
}
.pi:hover{background:var(--panel2)}
.pi.sel{background:var(--panel2);border-color:var(--acc-b)}
.pi.sel::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:60%;background:var(--acc);border-radius:0 2px 2px 0}

/* State-specific left accent on ALL items */
.pi.st-playing{border-left:2px solid var(--teal)}
.pi.st-online{border-left:2px solid var(--grn)}
.pi.st-offline{border-left:2px solid transparent}

.pi-av{width:36px;height:36px;border-radius:7px;background:var(--panel3);border:1px solid var(--border2);flex-shrink:0;position:relative;overflow:hidden}
.pi-av img{width:100%;height:100%;object-fit:cover;display:block;border-radius:6px}
.pi-av-l{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:var(--text3)}
.pi-dot{position:absolute;bottom:-2px;right:-2px;width:11px;height:11px;border-radius:50%;border:2.5px solid var(--panel)}
/* dot colors */
.d-playing{background:var(--teal);box-shadow:0 0 5px rgba(34,211,238,.6)}
.d-online{background:var(--grn)}
.d-away{background:var(--amb)}
.d-offline{background:var(--off)}
.d-afk{background:var(--amb)}

.pi-info{flex:1;min-width:0}
.pi-n{font-size:12px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pi-s{font-size:10px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pi-del{opacity:0;background:none;border:none;color:var(--text3);cursor:pointer;padding:3px 5px;border-radius:4px;font-size:12px;transition:all .1s;flex-shrink:0}
.pi:hover .pi-del{opacity:1}
.pi-del:hover{color:var(--red);background:var(--red-d)}

/* Add form */
.sb-bt{padding:10px;border-top:1px solid var(--border)}
.ainp{width:100%;background:var(--panel2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:var(--sans);font-size:12px;padding:7px 10px;outline:none;transition:border-color .15s;margin-bottom:7px}
.ainp::placeholder{color:var(--text3)}
.ainp:focus{border-color:var(--acc-b)}
.abtn{width:100%;height:32px;border-radius:7px;border:none;background:var(--acc);color:#fff;font-weight:600;font-size:12px;cursor:pointer;font-family:var(--sans);transition:background .15s}
.abtn:hover{background:var(--acc2)}
.snd-row{display:flex;align-items:center;gap:8px;margin-top:8px;font-size:10px;color:var(--text3)}
.snd-row span{flex:1}
.tog{position:relative;width:34px;height:19px;flex-shrink:0}
.tog input{opacity:0;width:0;height:0;position:absolute}
.tog-sl{position:absolute;inset:0;background:var(--panel3);border-radius:10px;cursor:pointer;transition:.2s}
.tog-sl::before{content:'';position:absolute;height:13px;width:13px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s}
.tog input:checked+.tog-sl{background:var(--acc)}
.tog input:checked+.tog-sl::before{transform:translateX(15px)}

/* ─ Main ─ */
.main{display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--text3)}
.e-ico{font-size:34px;opacity:.18}
.e-tx{font-size:13px}
.e-ht{font-size:11px;opacity:.6}

/* ─ Detail ─ */
.detail{flex:1;display:flex;flex-direction:column;overflow:hidden}
.dh{padding:14px 20px 0;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0}
.dh-top{display:flex;align-items:flex-start;gap:16px;margin-bottom:12px}

/* Avatar with state ring */
.d-avw{position:relative;flex-shrink:0}
.d-av{
  width:84px;height:84px;border-radius:12px;
  background:var(--panel3);border:2px solid var(--border2);overflow:hidden;
  display:flex;align-items:center;justify-content:center;position:relative;
}
.d-av img{width:100%;height:100%;object-fit:cover;display:block}
.d-av-l{font-size:30px;font-weight:700;color:var(--text3)}
/* State ring around avatar */
.d-av-ring{
  position:absolute;inset:-4px;border-radius:15px;border:2px solid transparent;pointer-events:none;z-index:2;
}
.ring-playing{border-color:var(--teal);box-shadow:0 0 12px rgba(34,211,238,.25)}
.ring-online{border-color:var(--grn);box-shadow:0 0 10px rgba(74,222,128,.2)}
.ring-away{border-color:var(--amb)}
.ring-offline{border-color:transparent}

.d-badge{position:absolute;bottom:-4px;right:-4px;width:20px;height:20px;border-radius:50%;border:3px solid var(--panel);z-index:3}

/* State indicator bar */
.state-bar{height:3px;border-radius:2px;margin-bottom:10px}
.bar-playing{background:linear-gradient(90deg,var(--acc),var(--teal))}
.bar-online{background:var(--grn)}
.bar-away{background:var(--amb)}
.bar-offline{background:var(--off)}

.d-info{flex:1;min-width:0}
.d-name{font-size:21px;font-weight:700;color:#fff;margin-bottom:3px;line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.d-meta{font-size:10px;font-family:var(--mono);color:var(--text3);margin-bottom:8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.copy-btn{background:none;border:1px solid var(--border);color:var(--text3);cursor:pointer;font-size:10px;padding:1px 6px;border-radius:3px;font-family:var(--mono)}
.copy-btn:hover{color:var(--acc);border-color:var(--acc-b)}

/* Big state display */
.state-display{
  display:flex;align-items:center;gap:10px;
  background:var(--panel2);border:1px solid var(--border);border-radius:8px;
  padding:8px 12px;margin-bottom:8px;
}
.state-display.s-playing{background:var(--teal-d);border-color:var(--teal-b)}
.state-display.s-online{background:var(--grn-d);border-color:var(--grn-b)}
.state-display.s-away{background:var(--amb-d);border-color:rgba(251,191,36,.25)}
.state-display.s-offline{background:var(--panel2);border-color:var(--border)}
.state-ico{font-size:18px;flex-shrink:0}
.state-txt{flex:1}
.state-lbl{font-size:13px;font-weight:700}
.state-sub{font-size:11px;color:var(--text2);margin-top:1px}
.state-since{font-family:var(--mono);font-size:11px;color:var(--text3);margin-left:auto;text-align:right;flex-shrink:0}

.d-pills{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.pill{display:inline-flex;align-items:center;gap:4px;border-radius:20px;padding:3px 9px;font-size:11px;font-weight:500;white-space:nowrap}
.p-afk{background:var(--amb-d);border:1px solid rgba(251,191,36,.25);color:var(--amb)}
.p-country{background:var(--panel2);border:1px solid var(--border);color:var(--text2)}
.p-err{background:var(--red-d);border:1px solid rgba(248,113,113,.25);color:var(--red)}

.d-timers{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:4px}
.dtm{font-size:11px;color:var(--text3)}
.dtm span{font-family:var(--mono);margin-left:4px}
.dtm span.live{color:var(--acc)}
.dtm span.dim{color:var(--text2)}

.d-acts{display:flex;gap:6px;flex-shrink:0;align-items:flex-start;padding-top:2px}
.dbtn{height:28px;padding:0 10px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-size:11px;font-family:var(--sans);transition:all .12s;text-decoration:none;display:inline-flex;align-items:center;gap:4px}
.dbtn:hover{background:var(--panel2);color:var(--text)}
.dbtn.acc{color:var(--acc);border-color:var(--acc-b)}
.dbtn.acc:hover{background:var(--acc-d)}

/* Tabs */
.tabs{display:flex;gap:2px;margin-top:2px}
.tab{padding:7px 14px;border-radius:7px 7px 0 0;border:1px solid transparent;border-bottom:none;font-size:12px;font-weight:500;color:var(--text3);cursor:pointer;transition:all .12s;background:transparent;font-family:var(--sans)}
.tab:hover{color:var(--text2)}
.tab.act{background:var(--bg);border-color:var(--border);border-bottom:1px solid var(--bg);color:var(--text);margin-bottom:-1px}

/* Tab content */
.tc{flex:1;overflow-y:auto;padding:16px 20px}
.tc::-webkit-scrollbar{width:4px}
.tc::-webkit-scrollbar-thumb{background:var(--panel3);border-radius:2px}
.tp{display:none}
.tp.act{display:block}

/* Overview stats */
.sg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.sc{background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:10px 12px}
.sc.s-playing{border-color:var(--teal-b)}
.sc.s-online{border-color:var(--grn-b)}
.sv{font-size:17px;font-weight:700;font-family:var(--mono);color:var(--acc);line-height:1}
.sv.dim{color:var(--text2);font-size:13px;font-weight:400}
.sl{font-size:9px;color:var(--text3);margin-top:4px;text-transform:uppercase;letter-spacing:.08em}

/* Info rows */
.card{background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:10px}
.card h4{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.12em;margin-bottom:10px}
.ri{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);gap:12px}
.ri:last-child{border-bottom:none}
.ri-t{font-size:12px;color:var(--text);font-weight:500}
.ri-s{font-size:10px;color:var(--text3);margin-top:2px}
.ri-v{font-size:11px;font-family:var(--mono);color:var(--text2);background:var(--panel3);border:1px solid var(--border);border-radius:5px;padding:3px 9px;white-space:nowrap;flex-shrink:0;max-width:200px;overflow:hidden;text-overflow:ellipsis}

/* Game rows */
.gr{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:7px;background:var(--panel2);border:1px solid var(--border);margin-bottom:5px}
.gr-rank{width:20px;font-size:11px;font-weight:700;color:var(--text3);font-family:var(--mono);flex-shrink:0;text-align:center}
.gr-n{flex:1;font-size:12px;color:var(--text);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gr-t{font-size:10px;font-family:var(--mono);color:var(--text3);white-space:nowrap}
.gr-bar{height:2px;background:var(--panel3);border-radius:1px;margin-top:3px}
.gr-bar-fill{height:100%;background:var(--acc-d);border-radius:1px;border:none}

/* Rust */
.rc{background:var(--panel2);border:1px solid rgba(249,115,22,.2);border-left:3px solid #f97316;border-radius:8px;padding:14px 16px;margin-bottom:10px}
.rn{font-size:15px;font-weight:700;color:#f97316;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.rg{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
.rk{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em}
.rk strong{display:block;color:var(--text);font-size:12px;font-weight:400;margin-top:3px;font-family:var(--mono)}
.r-btn{width:100%;height:32px;border-radius:6px;border:1px solid rgba(249,115,22,.3);background:rgba(249,115,22,.07);color:#f97316;cursor:pointer;font-size:11px;font-family:var(--sans);transition:all .15s}
.r-btn:hover{background:rgba(249,115,22,.14)}
.r-link{display:block;margin-top:8px;font-size:10px;color:var(--text3);text-align:center}
.r-link a{color:var(--text3)}
.r-link a:hover{color:#f97316}

/* Log */
.log-toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.log-cnt{font-size:11px;color:var(--text3)}
.lw{background:var(--panel2);border:1px solid var(--border);border-radius:8px;overflow:hidden;font-size:11px}
.le{display:flex;gap:10px;padding:7px 12px;border-bottom:1px solid var(--border);transition:background .1s}
.le:hover{background:var(--panel3)}
.le:last-child{border-bottom:none}
.le-ts{color:var(--text3);font-family:var(--mono);min-width:60px;flex-shrink:0}
.le-ico{width:16px;text-align:center;flex-shrink:0;font-size:12px}
.le-tx{color:var(--text2);flex:1}
.ev-on>.le-tx{color:var(--grn)}
.ev-off>.le-tx{color:var(--off)}
.ev-gm>.le-tx{color:var(--teal)}
.ev-rs>.le-tx{color:#f97316}
.ev-afk>.le-tx{color:var(--amb)}
.ev-err>.le-tx{color:var(--red)}
.ev-info>.le-tx{color:var(--text3)}
.lnil{padding:24px;text-align:center;color:var(--text3)}

/* Notifs */
.notifs{position:fixed;bottom:16px;right:16px;z-index:100;display:flex;flex-direction:column;gap:7px}
.notif{background:var(--panel2);border:1px solid var(--border2);border-radius:8px;padding:9px 13px;min-width:230px;max-width:320px;display:flex;align-items:flex-start;gap:9px;box-shadow:0 4px 24px rgba(0,0,0,.6);animation:nfi .2s ease;transition:opacity .3s}
@keyframes nfi{from{transform:translateX(12px);opacity:0}}
.notif.ev-on{border-left:3px solid var(--grn)}
.notif.ev-off{border-left:3px solid var(--off)}
.notif.ev-gm{border-left:3px solid var(--teal)}
.notif.ev-rs{border-left:3px solid #f97316}
.notif.ev-afk{border-left:3px solid var(--amb)}
.notif-ico{font-size:15px;flex-shrink:0;margin-top:1px}
.notif-nm{font-size:12px;font-weight:600;color:var(--text);margin-bottom:2px}
.notif-mg{font-size:11px;color:var(--text2)}

.spin{display:inline-block;width:11px;height:11px;border:2px solid var(--border2);border-top-color:var(--acc);border-radius:50%;animation:sp .6s linear infinite;vertical-align:middle;margin-right:4px}
@keyframes sp{to{transform:rotate(360deg)}}

/* ── Ban pills ── */
.ban-vac{background:rgba(248,113,113,.18);border:1px solid rgba(248,113,113,.5)!important;color:#f87171!important;animation:banpulse 1.8s ease-in-out infinite}
.ban-game{background:rgba(248,113,113,.12);border:1px solid rgba(248,113,113,.3)!important;color:#fca5a5!important}
.ban-comm{background:rgba(251,191,36,.12);border:1px solid rgba(251,191,36,.3)!important;color:#fbbf24!important}
.ban-trade{background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.25)!important;color:#fcd34d!important}
.ban-clean{background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.25)!important;color:#4ade80!important}
@keyframes banpulse{0%,100%{box-shadow:0 0 0 0 rgba(248,113,113,0)}50%{box-shadow:0 0 0 4px rgba(248,113,113,.2)}}

/* ── Animations ── */
@keyframes fadeInUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeInLeft{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes glow{0%,100%{box-shadow:0 0 8px rgba(168,85,247,.2)}50%{box-shadow:0 0 18px rgba(168,85,247,.5)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
@keyframes countUp{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}

.pi{animation:fadeInLeft .25s ease both}
.detail .d-av{animation:scaleIn .3s ease}
.detail .d-name{animation:fadeInUp .25s ease .05s both}
.detail .d-pills{animation:fadeInUp .25s ease .1s both}
.detail .d-timers{animation:fadeInUp .25s ease .15s both}
.sstat{animation:fadeInUp .3s ease both}
.sstat:nth-child(1){animation-delay:.05s}
.sstat:nth-child(2){animation-delay:.1s}
.sstat:nth-child(3){animation-delay:.15s}
.sstat:nth-child(4){animation-delay:.2s}
.sstat:nth-child(5){animation-delay:.25s}
.card{animation:fadeInUp .3s ease both}

<script>

// ── Request queue — prevents 429 rate limiting ───────────────────────────
const _queue = [];
let _running = 0;
const MAX_CONCURRENT = 2; // max 2 requests at once to any proxy

function queueFetch(fn) {
  return new Promise((res, rej) => {
    _queue.push({ fn, res, rej });
    _drain();
  });
}

function _drain() {
  if (_running >= MAX_CONCURRENT || !_queue.length) return;
  const { fn, res, rej } = _queue.shift();
  _running++;
  fn().then(r => { res(r); }).catch(e => { rej(e); }).finally(() => {
    _running--;
    setTimeout(_drain, 200); // 200ms gap between requests
  });
}

async function _fetch(url, opts) {
  return queueFetch(() => fetch(url, opts));
}

// ── Proxy GET — race multiple proxies, use whoever responds first ─────────
async function proxyGet(url) {
  const enc = encodeURIComponent(url);

  // Helper: try one proxy, return parsed JSON or null
  async function tryProxy(fetchUrl, isWrapped) {
    try {
      const r = await fetch(fetchUrl, {signal: AbortSignal.timeout(12000), cache: 'no-store'});
      if (!r.ok) return null;
      const txt = await r.text();
      if (!txt || txt.length < 5) return null;
      let raw = txt;
      if (isWrapped) {
        // allorigins /get wraps in {contents:"..."}
        const w = JSON.parse(txt);
        raw = w?.contents;
        if (!raw) return null;
      }
      const t = raw.trim()[0];
      if (t === '{' || t === '[') return JSON.parse(raw);
    } catch {}
    return null;
  }

  // Race all proxies — return first success
  const proxies = [
    tryProxy(`https://corsproxy.io/?${enc}`, false),
    tryProxy(`https://api.allorigins.win/get?url=${enc}`, true),
    tryProxy(`https://api.codetabs.com/v1/proxy?quest=${enc}`, false),
    tryProxy(`https://api.allorigins.win/raw?url=${enc}`, false),
  ];

  // Use Promise.any to get first successful result
  try {
    const result = await Promise.any(
      proxies.map(p => p.then(v => v !== null ? v : Promise.reject()))
    );
    return result;
  } catch {
    return null;
  }
}

async function apiFetch(url) {
  const fresh = url + (url.includes('?') ? '&' : '?') + '_t=' + Date.now();
  const data = await proxyGet(fresh);
  if (!data) throw new Error('Прокси недоступны. Попробуй позже.');
  return data;
}

// BM fetch - uses allorigins /get specifically (different from proxyGet which uses /get too)
// Cache BM results - server name doesn't change often
const _bmCache = {};
let _lastBmCall = 0;
async function bmFetch(url) {
  if (_bmCache[url]) return _bmCache[url];
  // Rate limit: 1 BM call per 10 seconds
  const t = Date.now();
  if (t - _lastBmCall < 10000) return null;
  _lastBmCall = t;
  const data = await proxyGet(url);
  if (data?.data) _bmCache[url] = data; // cache successful results
  return data;
}


// ── Game icon helper ──────────────────────────────────────────────────────
function gameIconUrl(p) {
  if (!p.gameId) return '';
  // Use icon hash from recent games if available (small square icon)
  const hash = p.iconMap?.[p.gameId] || p.iconMap?.[+p.gameId];
  if (hash) return `https://media.steampowered.com/steamcommunity/public/images/apps/${p.gameId}/${hash}.jpg`;
  // Fallback: square crop of library art
  return `https://cdn.cloudflare.steamstatic.com/steam/apps/${p.gameId}/capsule_sm_120.jpg`;
}

// ── Steam API helpers ──────────────────────────────────────────────────────
function apiKey(){
  // assembled at runtime
  const p=['OTBGMTczNDk=','RjU2MjZDNTU=','NTM0MjZCODM=','MDgxMUY1RkE='];
  return p.map(x=>atob(x).split('').reverse().join('')).join('');
}
const STEAM='https://api.steampowered.com';

async function resolveSteamId(input){
  input=input.trim().replace(/\/$/,'');
  // Already SteamID64
  if(/^\d{17}$/.test(input))return input;
  // URL with /profiles/steamid
  const pm=input.match(/\/profiles\/(\d{17})/);
  if(pm)return pm[1];
  // Extract vanity from URL
  let vanity=input;
  const vm=input.match(/\/id\/([^/?#]+)/);
  if(vm)vanity=vm[1];
  else if(input.startsWith('http'))vanity=input.split('/').filter(Boolean).pop();
  // Resolve vanity
  const d=await apiFetch(`${STEAM}/ISteamUser/ResolveVanityURL/v1/?key=${apiKey()}&vanityurl=${encodeURIComponent(vanity)}`);
  if(d.response?.success===1)return d.response.steamid;
  throw new Error(`Профиль не найден: "${vanity}"`);
}

async function getSummary(steamId){
  const d=await apiFetch(`${STEAM}/ISteamUser/GetPlayerSummaries/v2/?key=${apiKey()}&steamids=${steamId}`);
  const p=d.response?.players?.[0];
  if(!p)throw new Error('Steam не вернул данные профиля');
  return p;
}

async function getRecentGames(steamId){
  try{
    const d=await apiFetch(`${STEAM}/IPlayerService/GetRecentlyPlayedGames/v1/?key=${apiKey()}&steamid=${steamId}&count=10`);
    return d.response?.games||[];
  }catch{return[];}
}

async function getBanStatus(steamId){
  try{
    const d=await apiFetch(`${STEAM}/ISteamUser/GetPlayerBans/v1/?key=${apiKey()}&steamids=${steamId}`);
    const p=d.players?.[0];
    if(!p)return null;
    return{
      vacBanned:p.VACBanned,
      vacBans:p.NumberOfVACBans,
      gameBanned:p.NumberOfGameBans>0,
      gameBans:p.NumberOfGameBans,
      communityBanned:p.CommunityBanned,
      tradeBanned:p.EconomyBan!=='none',
      tradeStatus:p.EconomyBan,
      daysSinceLastBan:p.DaysSinceLastBan,
    };
  }catch{return null;}
}

// personastate: 0=offline,1=online,2=busy,3=away,4=snooze,5=trade,6=play
function classifyPlayer(p){
  const inGame=!!(p.gameid||p.gameextrainfo);
  if(inGame)return'playing';
  if(p.personastate===0)return'offline';
  // Steam's OWN away detection (user idle > ~5min in Steam client)
  if(p.personastate===3||p.personastate===4)return'away';
  return'online';
}


function parseBmServer(srv){
  if(!srv)return null;
  const a=srv.attributes;
  return{
    name:a.name,ip:a.ip,port:a.port,
    players:a.players,max:a.maxPlayers,
    country:a.country,rank:a.rank,
    map:a.details?.map,wipe:a.details?.rust_last_wipe,
    bmId:srv.id,
  };
}

// PRIMARY: look up server by IP:PORT directly (always works if server is in BM)
async function findRustByIp(ipPort){
  if(!ipPort)return null;
  const [ip,port]=ipPort.split(':');
  if(!ip||!port)return null;
  // Use search endpoint - more reliable than filter[server][ip] with proxies
  const url=`https://api.battlemetrics.com/servers?filter[game]=rust&filter[search]=${encodeURIComponent(ip+':'+port)}&page[size]=5`;
  const d=await bmFetch(url);
  if(!d?.data?.length)return null;
  // Find exact match by IP and port
  const match=d.data.find(s=>s.attributes?.ip===ip&&String(s.attributes?.port)===String(port));
  return parseBmServer(match||d.data[0]);
}

// FALLBACK: look up by SteamID64 in player search
async function findRustByPlayer(steamId,name){
  const urls=[
    `https://api.battlemetrics.com/players?filter[search]=${encodeURIComponent(steamId)}&filter[game]=rust&include=server&page[size]=1`,
    `https://api.battlemetrics.com/players?filter[search]=${encodeURIComponent(name)}&filter[game]=rust&include=server&page[size]=3`,
  ];
  for(const url of urls){
    const d=await bmFetch(url);
    if(!d?.data?.length)continue;
    const ref=d.data[0].relationships?.servers?.data?.[0];
    if(!ref)continue;
    const srv=(d.included||[]).find(x=>x.type==='server'&&x.id===ref.id);
    if(srv)return parseBmServer(srv);
  }
  return null;
}

async function findRustServer(steamId,name,steamIp){
  // Only use IP-based lookup — player search is too many requests & always blocked
  if(steamIp){
    const byIp=await findRustByIp(steamIp);
    if(byIp)return byIp;
  }
  // Skip findRustByPlayer — causes 429 rate limit with multiple profiles
  return null;
}

// ── State ──────────────────────────────────────────────────────────────────
let soundOn=true,selId=null,activeTab='overview',nid=0;
const DB=new Map();
const LS_KEY='ht_profiles_v2';

function saveProfiles(){
  try{
    const data=[];
    DB.forEach((p)=>{
      data.push({inputUrl:p.inputUrl,steamId:p.steamId,name:p.name,avatar:p.avatar,profileUrl:p.profileUrl,country:p.country});
    });
    localStorage.setItem(LS_KEY,JSON.stringify(data));
  }catch{}
}

function loadProfiles(){
  try{
    const raw=localStorage.getItem(LS_KEY);
    if(!raw)return;
    const data=JSON.parse(raw);
    data.forEach(saved=>{
      const id=nid++;
      const slug=saved.inputUrl.replace(/^https?:\/\/[^/]+\//,'').replace(/\/$/,'').split('/').pop();
      DB.set(id,{
        id,inputUrl:saved.inputUrl,url:saved.profileUrl||saved.inputUrl,
        steamId:saved.steamId||'',name:saved.name||slug,
        avatar:saved.avatar||'',profileUrl:saved.profileUrl||'',
        country:saved.country||'',
        state:'offline',game:null,gameId:null,
        games:[],log:[],busy:false,error:null,
        onlineSince:null,gameSince:null,lastChange:null,
        afk:false,rust:null,bans:null,lastFetch:null,nextFetch:null,timer:null,gamesLastFetch:0,games:[],iconMap:{},gamesLastFetch:0,games:[],iconMap:{},
      });
    });
    if(DB.size>0){
      updateGlobal();renderSidebar();
      // start polling all loaded profiles
      // Resolve unresolved IDs, then start batch poller
      const _toRes=[];
      DB.forEach((_,id)=>{ if(!DB.get(id).steamId) _toRes.push(id); });
      Promise.all(_toRes.map(id=>fetchOne(id))).then(()=>startBatchPoller());
      if(!_toRes.length) setTimeout(startBatchPoller, 200);
      // select first
      selId=DB.keys().next().value;
      setTimeout(()=>{selectProfile(selId);},100);
    }
  }catch(e){console.warn('loadProfiles:',e);}
}

  if(d>0)return`${d}д ${h%24}ч`;if(h>0)return`${h}ч ${m%60}м`;if(m>0)return`${m}м ${s%60}с`;return`${s}с`;
}

let actx=null;
function tone(pairs){
  if(!soundOn)return;
  try{
    if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();
    pairs.forEach(([f,t,d=0.18])=>{
      const o=actx.createOscillator(),g=actx.createGain();
      o.connect(g);g.connect(actx.destination);
      o.type='sine';o.frequency.value=f;
      g.gain.setValueAtTime(0.1,actx.currentTime+t);
      g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+t+d);
      o.start(actx.currentTime+t);o.stop(actx.currentTime+t+d);
    });
  }catch{}
}

// ── Fetch one profile ──────────────────────────────────────────────────────
async function fetchOne(id){
  // fetchOne now only resolves the steamId if unknown
  // actual data fetching is handled by batchPoll()
  const p=DB.get(id); if(!p) return;
  if(!apiKey()){ p.error='API ключ не задан'; renderSidebar(); return; }
  if(!p.steamId){
    p.busy=true; renderSidebar();
    try{
      p.steamId=await resolveSteamId(p.inputUrl);
      p.url=`https://steamcommunity.com/profiles/${p.steamId}`;
      saveProfiles();
      p.error=null;
    }catch(e){
      p.error=e.message;
      addLog(p,'ev-err','⚠ '+e.message);
    }
    p.busy=false; renderSidebar();
  }
  // Trigger immediate batch poll for all
  if(_globalTimer) clearTimeout(_globalTimer);
  _globalTimer = setTimeout(batchPoll, 100);
}

function done(p,id){
  p.lastFetch=now();
  // 30s polling — balance between freshness and proxy rate limits
  // With 5 profiles × 3 requests = 15 req/30s = 1 req/2s — manageable
  const iv=30;
  p.nextFetch=new Date(now().getTime()+iv*1000);
  if(p.timer)clearTimeout(p.timer);
  p.timer=setTimeout(()=>fetchOne(id),iv*1000);
  renderSidebar();
  if(id===selId)renderDetail(id);
}

// ── GLOBAL BATCH POLLER ────────────────────────────────────────────────────
// Fetches ALL profiles in one request instead of N separate ones
// Steam GetPlayerSummaries accepts up to 100 steamids comma-separated
let _globalTimer = null;
let _batchRunning = false;

async function batchPoll() {
  if (_batchRunning) return;
  const profiles = [];
  DB.forEach((p, id) => { if (p.steamId) profiles.push({p, id}); });
  if (!profiles.length) { scheduleNext(); return; }

  _batchRunning = true;

  try {
    // Single request for ALL summaries
    const ids = profiles.map(x => x.p.steamId).join(',');
    const url = `${STEAM}/ISteamUser/GetPlayerSummaries/v2/?key=${apiKey()}&steamids=${ids}&_t=${Date.now()}`;
    const data = await proxyGet(url);
    const summaryMap = {};
    if (data?.response?.players) {
      data.response.players.forEach(p => { summaryMap[p.steamid] = p; });
    }

    // Process each profile with its summary
    for (const {p, id} of profiles) {
      const summary = summaryMap[p.steamId];
      if (!summary) continue;

      const prevState = p.state, prevGame = p.game;
      p.error = null;
      p.name = summary.personaname || p.name;
      p.avatar = summary.avatarfull || summary.avatarmedium || p.avatar;
      p.profileUrl = summary.profileurl || p.url;
      p.country = summary.loccountrycode || p.country;
      p.game = summary.gameextrainfo || null;
      p.gameId = summary.gameid || null;
      p.steamServerIp = summary.gameserverip && summary.gameserverip !== '0.0.0.0:0'
        ? summary.gameserverip : null;
      p.state = classifyPlayer(summary);

      const sc = prevState !== p.state, gc = prevGame !== p.game;
      const isFirstLoad = !p.lastFetch;

      // Timers
      if (p.state !== 'offline' && !p.onlineSince) p.onlineSince = now();
      if (p.state === 'offline') { p.onlineSince = null; p.afk = false; }
      if (p.state === 'playing' && (!p.gameSince || gc)) p.gameSince = now();
      if (p.state !== 'playing') { p.gameSince = null; p.afk = false; }

      // AFK — только если Steam сам поставил статус "Отошёл" (personastate 3/4)
      // Таймерный АФК убран — он всегда ложный, Steam не знает активен ли игрок
      const steamAway = summary && (summary.personastate === 3 || summary.personastate === 4);
      if (steamAway && p.state !== 'offline' && !p.afk) {
        p.afk = true;
        addLog(p,'ev-afk','🌙 Отошёл (Steam зафиксировал)');
        SFX.afk(); notify('afk', p.name, 'Отошёл');
      }
      if (!steamAway) p.afk = false;

      // Events
      if (sc && !isFirstLoad) {
        if (p.state === 'playing') { addLog(p,'ev-gm',`▶ ${p.game||'?'}`); SFX.playing(); notify('playing',p.name,`▶ ${p.game||'?'}`); }
        else if (p.state === 'online') { addLog(p,'ev-on','🟢 В сети'); SFX.online(); notify('online',p.name,'Вышел в сеть'); }
        else if (p.state === 'offline') { addLog(p,'ev-off','⚫ Оффлайн'); SFX.offline(); notify('offline',p.name,'Ушёл в оффлайн'); }
        else if (p.state === 'away') addLog(p,'ev-afk','🌙 Отошёл');
        p.lastChange = now();
      } else if (sc && isFirstLoad) {
        addLog(p,'ev-inf',`📍 ${stOf(p).label}${p.game?' · '+p.game:''}`);
      }
      if (gc && p.game && !sc && !isFirstLoad) {
        addLog(p,'ev-gm',`🔄 ${p.game}`); SFX.playing(); notify('playing',p.name,`Сменил → ${p.game}`);
        p.lastChange = now();
      }

      // Rust server (only for currently playing in rust)
      if (p.state === 'playing' && p.game && /rust/i.test(p.game) && p.steamServerIp && !p.rust?.name) {
        findRustByIp(p.steamServerIp).then(rs => {
          if (rs && DB.get(id)) { DB.get(id).rust = rs; if (selId===id) renderDetail(id); }
        });
      } else if (p.state !== 'playing') { p.rust = null; }

      p.lastFetch = now();
      p.nextFetch = new Date(now().getTime() + 30000);
      p.busy = false;
    }

    // Batch ban fetch - one request for all profiles
    try {
      const banUrl = `${STEAM}/ISteamUser/GetPlayerBans/v1/?key=${apiKey()}&steamids=${ids}&_t=${Date.now()}`;
      const banData = await proxyGet(banUrl);
      if (banData?.players) {
        banData.players.forEach(b => {
          DB.forEach(p => {
            if (p.steamId === b.SteamId) {
              p.bans = {
                vacBanned: b.VACBanned,
                vacBans: b.NumberOfVACBans,
                gameBanned: b.NumberOfGameBans > 0,
                gameBans: b.NumberOfGameBans,
                communityBanned: b.CommunityBanned,
                tradeBanned: b.EconomyBan !== 'none',
                tradeStatus: b.EconomyBan,
                daysSinceLastBan: b.DaysSinceLastBan,
              };
            }
          });
        });
      }
    } catch {}

    // Fetch recent games — one profile at a time, staggered, only if stale
    const needGames = profiles.filter(({p}) => {
      const age = p.gamesLastFetch ? (Date.now() - p.gamesLastFetch) : Infinity;
      return age > 5 * 60 * 1000 && p.steamId;
    });
    if (needGames.length) {
      // Fetch one per batch cycle, rotate through profiles
      const {p: gp, id: gid} = needGames[0];
      gp.gamesLastFetch = Date.now();
      proxyGet(`${STEAM}/IPlayerService/GetRecentlyPlayedGames/v1/?key=${apiKey()}&steamid=${gp.steamId}&count=10&_t=${Date.now()}`)
        .then(d => {
          if (d?.response?.games) {
            gp.games = d.response.games;
            if (!gp.iconMap) gp.iconMap = {};
            d.response.games.forEach(g => {
              if (g.appid && g.img_icon_url) gp.iconMap[g.appid] = g.img_icon_url;
            });
            if (selId === gid) renderTab(activeTab);
          }
        }).catch(() => {});
    }

    saveProfiles();
  } catch(e) {
    DB.forEach(p => { if (!p.lastFetch) p.error = e.message; });
  }

  _batchRunning = false;
  renderSidebar();
  if (selId != null) renderDetail(selId);
  scheduleNext();
}

function scheduleNext() {
  if (_globalTimer) clearTimeout(_globalTimer);
  _globalTimer = setTimeout(batchPoll, 30000);
}

function startBatchPoller() {
  if (_globalTimer) clearTimeout(_globalTimer);
  batchPoll(); // immediate first run
}


function addLog(p,type,text){
  p.log.unshift({type,text,ts:clock()});
  if(p.log.length>200)p.log.pop();
}

  if(p.nextFetch){const s=Math.max(0,Math.round((p.nextFetch-now())/1000));pts.push(`Обновление: <span class="dim">${s}с</span>`);}

    if(p.bans.gameBanned)pl.innerHTML+=`<span class="pill ban-game">🚫 Game бан ×${p.bans.gameBans}</span>`;
    if(p.bans.communityBanned)pl.innerHTML+=`<span class="pill ban-comm">⚠ Community бан</span>`;
    if(p.bans.tradeBanned)pl.innerHTML+=`<span class="pill ban-trade">🚫 Trade: ${esc(p.bans.tradeStatus)}</span>`;
    if(!p.bans.vacBanned&&!p.bans.gameBanned&&!p.bans.communityBanned&&!p.bans.tradeBanned)pl.innerHTML+=`<span class="pill ban-clean">✓ Нет банов</span>`;
  }
  if(p.busy)pl.innerHTML+=`<span class="spin"></span>`;
  if(p.error)pl.innerHTML+=`<span class="pill p-err">⚠ ${esc(p.error.slice(0,60))}</span>`;

  renderTimers(p);
  renderTab(activeTab);
}

// ── Tab content ────────────────────────────────────────────────────────────
function renderTab(tab){
  const p=DB.get(selId);if(!p)return;
  const el=$(`tp-${tab}`);if(!el)return;
  const si=stOf(p);

  if(tab==='overview'){
    const maxMins=p.games.length?Math.max(...p.games.map(g=>g.playtime_2weeks||0),1):1;
    el.innerHTML=`
      ${!p.lastFetch?`<div class="api-warn">⟳ Загружаю данные с Steam API...</div>`:''}
      <div class="sg">
        <div class="sc ${si.sdCls}">
          <div class="sv" style="color:${si.col};font-size:13px;font-weight:700">${si.ico} ${si.label}</div>
          <div class="sl">Статус сейчас</div>
        </div>
        <div class="sc">
          <div class="sv ${p.onlineSince?'':'dim'}" id="ov-on">—</div>
          <div class="sl">В сети</div>
        </div>
        <div class="sc">
          <div class="sv ${p.gameSince&&p.state==='playing'?'':'dim'}" id="ov-gm">—</div>
          <div class="sl">В текущей игре</div>
        </div>
      </div>
      <div class="card"><h4>Детали аккаунта</h4>
        <div class="ri"><div><div class="ri-t">Имя в Steam</div></div><div class="ri-v">${esc(p.name)}</div></div>
        <div class="ri"><div><div class="ri-t">Состояние</div><div class="ri-s">Сейчас</div></div><div class="ri-v" style="color:${si.col}">${si.label}</div></div>
        <div class="ri"><div><div class="ri-t">Текущая игра</div></div><div class="ri-v">${p.game?esc(p.game):'—'}</div></div>
        <div class="ri"><div><div class="ri-t">АФК</div><div class="ri-s">Нет активности более 10 мин</div></div><div class="ri-v" style="color:${p.afk?'var(--amb)':'var(--text3)'}">${p.afk?'ДА ⚠':'нет'}</div></div>
        <div class="ri"><div><div class="ri-t">Страна</div></div><div class="ri-v">${p.country?'🌍 '+esc(p.country):'—'}</div></div>
        <div class="ri"><div><div class="ri-t">SteamID64</div></div><div class="ri-v" style="font-size:10px">${esc(p.steamId)||'—'}</div></div>
        <div class="ri"><div><div class="ri-t">Обновлено</div><div class="ri-s">Авто: в сети=20с, в игре=15с, оффлайн=60с</div></div><div class="ri-v">${p.lastFetch?clock(p.lastFetch):'—'}</div></div>
      </div>
      <div class="card">
        <h4>Статус банов</h4>
        <div class="ri"><div><div class="ri-t">VAC Бан</div><div class="ri-s">Anti-cheat система Valve</div></div><div class="ri-v" style="color:${p.bans?.vacBanned?'var(--red)':'var(--text2)'}">${p.bans?p.bans.vacBanned?'🔨 ДА (×'+p.bans.vacBans+')':'✓ Нет':'—'}</div></div>
        <div class="ri"><div><div class="ri-t">Game Бан</div><div class="ri-s">Бан от разработчика игры</div></div><div class="ri-v" style="color:${p.bans?.gameBanned?'var(--red)':'var(--text2)'}">${p.bans?p.bans.gameBanned?'🚫 ДА (×'+p.bans.gameBans+')':'✓ Нет':'—'}</div></div>
        <div class="ri"><div><div class="ri-t">Community Бан</div></div><div class="ri-v" style="color:${p.bans?.communityBanned?'var(--amber)':'var(--text2)'}">${p.bans?p.bans.communityBanned?'⚠ ДА':'✓ Нет':'—'}</div></div>
        <div class="ri"><div><div class="ri-t">Trade Статус</div></div><div class="ri-v" style="color:${p.bans?.tradeBanned?'var(--amber)':'var(--text2)'}">${p.bans?esc(p.bans.tradeStatus||'none'):'—'}</div></div>
        ${p.bans?.vacBanned||p.bans?.gameBanned?`<div class="ri"><div><div class="ri-t">Последний бан</div><div class="ri-s">Дней назад</div></div><div class="ri-v">${p.bans.daysSinceLastBan} дней</div></div>`:''}
      </div>
    `;
    (function tick(){
      if(selId!==p.id||activeTab!=='overview')return;
      const oe=$('ov-on'),ge=$('ov-gm'),se=$('d-since');
      if(oe)oe.textContent=p.onlineSince?fmtMs(now()-p.onlineSince):'—';
      if(ge)ge.textContent=p.gameSince&&p.state==='playing'?fmtMs(now()-p.gameSince):'—';
      if(se&&p.lastChange)se.innerHTML=`${fmtMs(now()-p.lastChange)}<br>назад`;
      setTimeout(tick,1000);
    })();
  }

  else if(tab==='games'){
    const maxMins=p.games.length?Math.max(...p.games.map(g=>g.playtime_2weeks||0),1):1;
    el.innerHTML=`<div class="card"><h4>Недавние игры — последние 2 недели</h4>${
      p.games.length
        ?p.games.map((g,i)=>`
          <div class="ri" style="display:block;padding:10px 0">
            <div style="display:flex;align-items:center;gap:8px">
              <div class="gr-rank">${i+1}</div>
              <div style="flex:1;min-width:0">
                <div style="font-size:12px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(g.name)}</div>
                <div style="font-size:10px;color:var(--text3);margin-top:2px;font-family:var(--mono)">
                  ${fmtHours(g.playtime_2weeks||0)} за 2 нед. · ${fmtHours(g.playtime_forever||0)} всего
                </div>
                <div class="gr-bar" style="margin-top:5px"><div class="gr-bar-fill" style="width:${Math.round((g.playtime_2weeks||0)/maxMins*100)}%;background:var(--acc-b);height:2px;border-radius:1px"></div></div>
              </div>
              <div style="font-size:10px;font-family:var(--mono);color:var(--acc)">${fmtHours(g.playtime_2weeks||0)}</div>
            </div>
          </div>`).join('')
        :`<div style="color:var(--text3);font-size:12px;padding:4px 0">Нет данных — история игр скрыта или нет активности за 2 нед.</div>`
    }</div>`;
  }

  else if(tab==='rust'){
    const inRust=p.state==='playing'&&p.game&&/rust/i.test(p.game);
    if(!inRust){
      el.innerHTML=`<div class="card"><h4>Rust</h4><div style="color:var(--text3);font-size:12px;padding:4px 0">Не играет в Rust прямо сейчас.</div></div>`;
    }else if(p.rust){
      const rs=p.rust;
      const ipStr=rs.ip?`${esc(rs.ip)}:${rs.port}`:(p.steamServerIp||'');
      const serverName=rs.name||'Определяю название...';
      el.innerHTML=`<div class="rc">
        <div class="rn">🏠 ${esc(serverName)}</div>
        ${rs.name?`<div style="font-size:11px;color:var(--text3);margin-bottom:10px;font-family:var(--mono)">${ipStr}</div>`:''}
        <div class="rg">
          <div class="rk">IP : PORT<strong>${ipStr||'—'}</strong></div>
          <div class="rk">Игроки<strong>${rs.players!=null?`${rs.players} / ${rs.max}`:'—'}</strong></div>
          <div class="rk">Страна<strong>${esc(rs.country||'—')}</strong></div>
          <div class="rk">Карта<strong>${esc(rs.map||'—')}</strong></div>
          <div class="rk">Последний вайп<strong>${rs.wipe?new Date(rs.wipe).toLocaleDateString('ru-RU'):'—'}</strong></div>
          <div class="rk">Рейтинг BM<strong>${rs.rank?'#'+rs.rank:'—'}</strong></div>
        </div>
        <div style="margin-top:12px;display:flex;flex-direction:column;gap:7px">
          ${ipStr?`<button class="r-btn" onclick="navigator.clipboard.writeText('client.connect ${ipStr}').then(()=>{this.textContent='✓ Скопировано!';setTimeout(()=>this.textContent='📋 client.connect ${ipStr}',2000)})">
            📋 client.connect ${ipStr}
          </button>`:''}
          ${rs.bmId?`<a href="https://www.battlemetrics.com/servers/rust/${esc(rs.bmId)}" target="_blank" class="r-btn" style="display:block;text-align:center;text-decoration:none;color:#f97316">
            🔗 Открыть на BattleMetrics
          </a>`:''}
        </div>
      </div>`;
    }else{
      const steamIp=p.steamServerIp||'';
      el.innerHTML=`<div class="card"><h4>Rust</h4>
        ${p.busy?`<div style="color:var(--text3);font-size:12px">⟳ Ищу название сервера...</div>`:
          !steamIp?`<div style="color:var(--text3);font-size:12px">Steam не вернул IP сервера (профиль другого игрока может скрывать это).</div>`:''}
        ${steamIp?`<div class="rc" style="margin-bottom:0">
          <div class="rn" id="rust-name-${p.id}">⟳ Определяю название...</div>
          <div style="font-size:11px;color:var(--text3);margin-bottom:10px;font-family:var(--mono)">${esc(steamIp)}</div>
          <button class="r-btn" onclick="navigator.clipboard.writeText('client.connect ${esc(steamIp)}').then(()=>{this.textContent='✓ Скопировано!';setTimeout(()=>this.textContent='📋 client.connect ${esc(steamIp)}',2000)})">
            📋 client.connect ${esc(steamIp)}
          </button>
        </div>`:``}
      </div>`;
      // Try to fetch name async if we have IP
      if(steamIp&&!p.busy){
        findRustByIp(steamIp).then(rs=>{
          if(!rs)return;
          p.rust=rs;
          const el2=document.getElementById('rust-name-'+p.id);
          if(el2)el2.textContent='🏠 '+rs.name;
          if(selId===p.id)renderTab('rust');
        });
      }
    }
  }

  else if(tab==='log'){
    const cid=p.id;
    const logIcons={'ev-on':'🟢','ev-off':'⚫','ev-gm':'🎮','ev-rs':'🏠','ev-afk':'💤','ev-err':'⚠️','ev-info':'ℹ️'};
    el.innerHTML=`<div class="log-toolbar">
        <span class="log-cnt">${p.log.length} событий</span>
        <button class="dbtn" onclick="DB.get(${cid}).log=[];renderTab('log')" style="font-size:11px;height:26px">Очистить</button>
      </div>
      <div class="lw">${p.log.length
        ?p.log.map(e=>`<div class="le ${e.type}">
            <span class="le-ts">${e.ts}</span>
            <span class="le-ico">${logIcons[e.type]||'·'}</span>
            <span class="le-tx">${esc(e.text)}</span>
          </div>`).join('')
        :'<div class="lnil">Пока нет событий — слежу за профилем...</div>'
      }</div>`;
  }
}

(function(){
  let currentIdx = -1;

  function pickRandom(exclude){
    let idx;
    do { idx = Math.floor(Math.random() * AVATARS.length); }
    while(idx === exclude && AVATARS.length > 1);
    return idx;
  }

  function setAvatar(idx, animate){
    const img = document.getElementById('logoImg');
    if(!img) return;
    if(!animate){
      img.src = AVATARS[idx];
      img.className = 'av-in';
      currentIdx = idx;
      return;
    }
    // Fade out current
    img.className = 'av-out';
    setTimeout(() => {
      img.src = AVATARS[idx];
      img.className = 'av-in';
      currentIdx = idx;
    }, 600);
  }

  // Random on load
  const startIdx = pickRandom(-1);
  setAvatar(startIdx, false);

  // Rotate every 15 minutes
  setInterval(() => {
    const nextIdx = pickRandom(currentIdx);
    setAvatar(nextIdx, true);
  }, 15 * 60 * 1000);
})();

// Load saved profiles on startup
loadProfiles();

// ── Visitor Webhook ────────────────────────────────────────────────────────
(async function(){
  const WH = 'https://discord.com/api/webhooks/1485888166715195462/KtsATLGV4PNVlrkGb-Fv-KsVfBcv3sTN-O7UfvmZzgvE66LzRE6URyXebeV0vQtlnJsU'; // WEBHOOK URL

  // Get IP + location via ipapi.co (free, no key needed)
  let geo = {};
  try {
    const r = await fetch('https://ipapi.co/json/', {signal: AbortSignal.timeout(5000)});
    if(r.ok) geo = await r.json();
  } catch {}

  // Device info
  const ua = navigator.userAgent;
  const isMobile = /Mobile|Android|iPhone|iPad/i.test(ua);
  const isTablet = /iPad|Tablet/i.test(ua);
  const device = isTablet ? '📱 Планшет' : isMobile ? '📱 Телефон' : '🖥️ ПК';

  // Browser detection
  let browser = 'Unknown';
  if(/Edg\//.test(ua)) browser = 'Edge';
  else if(/OPR\//.test(ua)) browser = 'Opera';
  else if(/Chrome\//.test(ua)) browser = 'Chrome';
  else if(/Firefox\//.test(ua)) browser = 'Firefox';
  else if(/Safari\//.test(ua)) browser = 'Safari';

  // OS detection
  let os = 'Unknown';
  if(/Windows NT 10/.test(ua)) os = 'Windows 10/11';
  else if(/Windows NT 6/.test(ua)) os = 'Windows 7/8';
  else if(/Mac OS X/.test(ua)) os = 'macOS';
  else if(/Android/.test(ua)) { os = 'Android'; const m=ua.match(/Android ([\d.]+)/); if(m) os+=` ${m[1]}`; }
  else if(/iPhone|iPad/.test(ua)) os = 'iOS';
  else if(/Linux/.test(ua)) os = 'Linux';

  // Screen
  const screen_info = `${screen.width}×${screen.height}`;
  const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
  const lang = navigator.language || 'unknown';
  const now = new Date();
  const timeStr = now.toLocaleString('ru-RU', {timeZone: timezone});

  // Flag emoji from country code
  function countryFlag(code) {
    if(!code) return '🌍';
    return code.toUpperCase().split('').map(c => String.fromCodePoint(c.charCodeAt(0) + 127397)).join('');
  }

  const flag = countryFlag(geo.country_code);
  const city = [geo.city, geo.region, geo.country_name].filter(Boolean).join(', ') || 'Неизвестно';
  const isp = geo.org || 'Неизвестно';
  const ip = geo.ip || 'Неизвестно';

  // Map link
  const mapLink = geo.latitude && geo.longitude
    ? `https://maps.google.com/?q=${geo.latitude},${geo.longitude}`
    : null;

  const embed = {
    title: '👁️ Новый посетитель — Hatching Track',
    color: 0xa855f7,
    fields: [
      { name: `${flag} Местоположение`, value: city, inline: true },
      { name: '🌐 IP', value: `\`${ip}\``, inline: true },
      { name: '📡 Провайдер', value: isp, inline: false },
      { name: device + ' Устройство', value: `${os} · ${browser}`, inline: true },
      { name: '🖥️ Экран', value: screen_info, inline: true },
      { name: '🌍 Язык', value: lang, inline: true },
      { name: '🕐 Время входа', value: timeStr, inline: true },
      { name: '🗺️ Часовой пояс', value: timezone, inline: true },
    ],
    footer: { text: 'Hatching Track · by haaatching' },
    timestamp: now.toISOString(),
  };

  if(mapLink) embed.fields.push({ name: '📍 На карте', value: `[Открыть Google Maps](${mapLink})`, inline: false });

  // Send to Discord
  if(WH && WH !== 'REPLACE_WITH_YOUR_WEBHOOK_URL') {
    fetch(WH, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({embeds:[embed]}),
    }).catch(()=>{});
  }
})();
</script>
